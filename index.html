<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://omg10.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/hJmXpt3x1.mp4","SV454N4 D14M M3MBV4T R454 M3NGG3M4"],
  ["https://cdn2.videy.co/IoatpoSd1.mp4","M4L4M S3P1 J4D1 4W4L P3RVB4H4N"],
  ["https://cdn2.videy.co/pOarG58p1.mp4","P4ND4N94N L4M4 Y4NG T4K B154 D1H1ND4R1"],
  ["https://cdn2.videy.co/yzKnxqbF1.mp4","K3D3K4T4N H4LVS M3NGVND4NG R454"],
  ["https://cdn2.videy.co/mRcLTw491.mp4","R454 H4NG4T M3NG4L1R T4NP4 K4T4"],
  ["https://cdn2.videy.co/02PPAXT81.mp4","SV454N4 M4L4M M3MBV4T N4P45 B3R4T"],
  ["https://cdn2.videy.co/Sbs4wlvZ1.mp4","H3N1NG Y4NG M3MBV4T J4NTVNG B3RVB4H"],
  ["https://cdn2.videy.co/d2AVvZZc1.mp4","P1K1R4N K4CV K4R3N4 J4R4K T3R454"],
  ["https://cdn2.videy.co/ai91H7zM1.mp4","G3R4K K3C1L Y4NG M3NGVB4H SV454N4"],
  ["https://cdn2.videy.co/wHZindxs1.mp4","R454 L3MBVT N4MVN M3N3K4N"],
  ["https://cdn2.videy.co/cwnkcz3E1.mp4","SV454N4 D3K4T M3MBV4T H4T1 G3T4R"],
  ["https://cdn2.videy.co/C0rDFy4H1.mp4","P4ND4N94N D3K4T Y4NG S3M4K1N D4L4M"],
  ["https://cdn2.videy.co/mFgHwIfo1.mp4","K3H3N1NG4N M3MBV4T R454 T4MB4H N4Y4"],
  ["https://cdn2.videy.co/ScpdQVkq1.mp4","M4L4M P4NJ4NG M3MB3R1 W4KTU"],
  ["https://cdn2.videy.co/jdsGTVMl1.mp4","R454 T3R454 T1NG94L D4L4M D14M"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
